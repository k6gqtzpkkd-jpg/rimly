<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Rimly Key</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#FF6B00" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Rimly Key" />
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/846/846985.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="auth-container">
    <div class="logo-glow">RIMLY KEY</div>
    <div class="subtitle">TAP TO UNLOCK SYSTEM</div>

    <div class="face-id-btn" id="btn-auth">
      <div class="face-id-icon">🔓</div>
    </div>

    <div class="status-msg" id="status">認証待機中...</div>

    <div style="margin-top:50px; color:rgba(255,255,255,0.4); font-size:12px;">
      同期IDキー: <br/>
      <span id="sync-key" style="color:var(--theme-color, #FF6B00); font-weight:900; font-size:18px; letter-spacing:2px; display:inline-block; margin-top:5px; background:rgba(255,107,0,0.1); padding:5px 15px; border-radius:8px;"></span>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
